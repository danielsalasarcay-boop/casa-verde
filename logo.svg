<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 248 52" fill="none">

  <!-- House mark — clean architectural silhouette -->
  <g stroke="#000" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Roof -->
    <polyline points="6,44 6,29 20,11 34,29 34,44" stroke-width="1.5"/>
    <!-- Floor line -->
    <line x1="6" y1="44" x2="34" y2="44" stroke-width="1.5"/>
    <!-- Door arch -->
    <path d="M15,44 L15,35 Q20,30.5 25,35 L25,44" stroke-width="1.3"/>
  </g>

  <!-- Vertical rule -->
  <line x1="48" y1="12" x2="48" y2="40" stroke="#000" stroke-width="0.6" opacity="0.22"/>

  <!-- CASA VERDE — primary wordmark -->
  <text
    x="58" y="31"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16"
    font-weight="400"
    letter-spacing="5.5"
    fill="#000">CASA VERDE</text>

  <!-- Subtitle -->
  <text
    x="59.5" y="42"
    font-family="Arial, Helvetica, sans-serif"
    font-size="6.5"
    font-weight="400"
    letter-spacing="3.2"
    fill="#000"
    opacity="0.45">LOS ROQUES · VENEZUELA</text>

</svg>
